<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>那魯灣那魯土那魯佛那魯財進門</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
        }

        .reached {
            background-color: #fee2e2 !important;
            color: #b91c1c !important;
            border: 2px solid #ef4444 !important;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tab-btn {
            transition: all 0.2s ease;
        }

        .tab-active {
            background-color: #eab308;
            color: #1e293b;
            border-color: #eab308;
        }

        .tab-inactive {
            background-color: #1e293b;
            color: #94a3b8;
            border-color: #334155;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        #login-screen.hidden {
            display: none;
        }
    </style>
</head>

<body class="pb-10">

    <!-- 登入畫面 -->
    <div id="login-screen">
        <div class="text-yellow-400 text-2xl font-black text-center px-4">
            那魯灣那魯土那魯佛那魯財進門
        </div>

        <div class="text-slate-400 text-sm">
            請登入 Google 帳號以繼續
        </div>

        <div id="g_id_onload"
             data-client_id="249677015359-vor32g01fj3r4ho0p75kgarb67k97h2r.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-theme="filled_black"
             data-size="large"
             data-shape="pill">
        </div>

        <div id="login-error" class="text-red-400 text-sm font-bold hidden"></div>
    </div>


    <!-- 主畫面 -->
    <div id="app-screen" class="hidden">

        <nav class="bg-slate-900 pt-3 shadow-lg sticky top-0 z-50 border-b-2 border-yellow-500">
            <div class="flex items-center justify-between px-4 mb-2">
                <div class="text-sm font-black text-yellow-400">
                    那魯灣那魯土那魯佛那魯財進門
                </div>

                <div class="flex items-center gap-2">
                    <span id="user-email" class="text-xs text-slate-400 hidden md:block"></span>

                    <button onclick="signOut()"
                            class="text-xs text-slate-400 hover:text-red-400 transition font-bold px-2 py-1 rounded border border-slate-600 hover:border-red-400">
                        登出
                    </button>
                </div>
            </div>

            <div class="flex justify-center max-w-7xl mx-auto px-4 gap-1 md:gap-2">
                <button onclick="switchTab('八爪賺大錢')" id="tab-八爪賺大錢"
                        class="tab-btn tab-active flex-1 md:flex-none px-4 py-2 rounded-t-lg font-black text-sm md:text-base border-t-2 border-l-2 border-r-2">
                    八爪賺大錢
                </button>

                <button onclick="switchTab('喝茶趴賺大錢')" id="tab-喝茶趴賺大錢"
                        class="tab-btn tab-inactive flex-1 md:flex-none px-4 py-2 rounded-t-lg font-black text-sm md:text-base border-t-2 border-l-2 border-r-2">
                    喝茶趴賺大錢
                </button>

                <button onclick="switchTab('路邊賺大錢')" id="tab-路邊賺大錢"
                        class="tab-btn tab-inactive flex-1 md:flex-none px-4 py-2 rounded-t-lg font-black text-sm md:text-base border-t-2 border-l-2 border-r-2">
                    路邊賺大錢
                </button>
            </div>
        </nav>


        <div class="max-w-7xl mx-auto px-4 mt-2 flex justify-end">
            <span id="last-update-time"
                  class="text-xs font-bold text-slate-400 bg-slate-200 px-2 py-1 rounded-full shadow-sm border border-slate-300">
                最後更新：尚未讀取
            </span>
        </div>


        <main class="max-w-7xl mx-auto p-4 mt-2">

            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-200">
                <div class="flex flex-col md:flex-row gap-4 items-end">

                    <div class="flex-1 w-full">
                        <label class="block text-[10px] font-bold text-indigo-500 mb-1">
                            股票代號
                            (<span id="current-tab-label" class="text-yellow-600">八爪賺大錢</span>)
                        </label>

                        <input type="text" id="symbol" placeholder="代號"
                               class="border-b-2 border-slate-200 py-1 w-full font-black text-2xl outline-none focus:border-indigo-500 bg-transparent">
                    </div>

                    <div class="flex-[3] flex w-full gap-2">
                        <div class="flex-1 text-center">
                            <label class="text-[9px] font-bold text-slate-400">T1</label>
                            <input type="number" id="n1"
                                   class="border-b-2 border-slate-100 py-1 w-full font-black text-center outline-none focus:border-yellow-400 bg-transparent">
                        </div>

                        <div class="flex-1 text-center">
                            <label class="text-[9px] font-bold text-slate-400">T2</label>
                            <input type="number" id="n2"
                                   class="border-b-2 border-slate-100 py-1 w-full font-black text-center outline-none focus:border-yellow-400 bg-transparent">
                        </div>

                        <div class="flex-1 text-center">
                            <label class="text-[9px] font-bold text-slate-400">T3</label>
                            <input type="number" id="n3"
                                   class="border-b-2 border-slate-100 py-1 w-full font-black text-center outline-none focus:border-yellow-400 bg-transparent">
                        </div>

                        <div class="flex-1 text-center">
                            <label class="text-[9px] font-bold text-slate-400">T4</label>
                            <input type="number" id="n4"
                                   class="border-b-2 border-slate-100 py-1 w-full font-black text-center outline-none focus:border-yellow-400 bg-transparent">
                        </div>

                        <div class="flex-1 text-center">
                            <label class="text-[9px] font-bold text-slate-400">T5</label>
                            <input type="number" id="n5"
                                   class="border-b-2 border-slate-100 py-1 w-full font-black text-center outline-none focus:border-yellow-400 bg-transparent">
                        </div>
                    </div>

                    <button onclick="saveData()" id="saveBtn"
                            class="w-full md:w-auto bg-indigo-600 text-white px-8 py-2 rounded-xl font-black hover:bg-indigo-700 transition shadow-md">
                        儲存/更新
                    </button>

                </div>
            </div>

            <div id="display-list" class="space-y-3">
                <p class="text-center text-slate-400 font-bold py-10">
                    請先登入
                </p>
            </div>

        </main>
    </div>


    <script>
        let currentTab = "八爪賺大錢";
        let globalDataCache = {};
        let idToken = null;


        // =====================================================
        // Google 登入成功
        // =====================================================
        function handleCredentialResponse(response) {
            idToken = response.credential;

            try {
                const payload = JSON.parse(base64UrlDecode(idToken.split('.')[1]));
                document.getElementById('user-email').textContent = payload.email || "";
            } catch (e) {
                console.warn("token 解析失敗", e);
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('login-error').classList.add('hidden');

            fetchAllData();
        }


        // =====================================================
        // JWT base64url decode
        // =====================================================
        function base64UrlDecode(str) {
            str = str.replace(/-/g, '+').replace(/_/g, '/');

            while (str.length % 4) {
                str += '=';
            }

            return decodeURIComponent(
                atob(str)
                    .split('')
                    .map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    })
                    .join('')
            );
        }


        // =====================================================
        // 登出
        // =====================================================
        function signOut() {
            idToken = null;
            globalDataCache = {};

            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('display-list').innerHTML =
                `<p class="text-center text-slate-400 font-bold py-10">請先登入</p>`;

            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }
        }


        // =====================================================
        // 切換頁籤
        // =====================================================
        function switchTab(tabName) {
            currentTab = tabName;

            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            });

            document.getElementById(`tab-${tabName}`).classList.remove('tab-inactive');
            document.getElementById(`tab-${tabName}`).classList.add('tab-active');

            document.getElementById('current-tab-label').innerText = tabName;

            fillForm('', '', '', '', '', '');
            renderList();
        }


        // =====================================================
        // 讀取全部資料
        // 使用 google.script.run，不再 fetch，不會有 CORS NetworkError
        // =====================================================
        function fetchAllData() {
            const listDiv = document.getElementById('display-list');
            const timeLabel = document.getElementById('last-update-time');

            if (!idToken) {
                listDiv.innerHTML =
                    `<p class="text-center text-red-500 font-bold py-10">尚未登入，請重新登入</p>`;
                return;
            }

            if (Object.keys(globalDataCache).length === 0) {
                listDiv.innerHTML =
                    `<p class="text-center text-slate-400 font-bold py-10">連線資料庫中...</p>`;
            }

            google.script.run
                .withSuccessHandler(function(res) {
                    if (!res || res.status !== "success") {
                        const msg = res && res.message ? res.message : "讀取失敗";
                        listDiv.innerHTML =
                            `<p class="text-center text-red-500 font-bold py-10">⚠️ ${escapeHtml(msg)}</p>`;
                        return;
                    }

                    globalDataCache = res.data || {};

                    timeLabel.innerText = `最後更新：${res.serverTime || "--"}`;

                    renderList();
                })
                .withFailureHandler(function(err) {
                    const msg = err && err.message ? err.message : String(err);

                    listDiv.innerHTML =
                        `<p class="text-center text-red-500 font-bold py-10">讀取失敗：${escapeHtml(msg)}</p>`;

                    if (msg.includes("登入") || msg.includes("token") || msg.includes("無權限")) {
                        document.getElementById('login-error').textContent = msg;
                        document.getElementById('login-error').classList.remove('hidden');
                    }
                })
                .apiGetAllData(idToken);
        }


        // =====================================================
        // 渲染清單
        // =====================================================
        function renderList() {
            const listDiv = document.getElementById('display-list');
            const data = globalDataCache[currentTab] || [];

            listDiv.innerHTML = "";

            if (data.length === 0) {
                listDiv.innerHTML =
                    `<p class="text-center text-slate-400 font-bold py-10">此頁籤目前沒有資料喔！</p>`;
                return;
            }

            data.forEach(function(item) {
                const price = parseFloat(item.price) || 0;

                const checkColor = function(val) {
                    if (!val || isNaN(val)) {
                        return 'bg-slate-50 border-slate-100 text-slate-900';
                    }

                    return price >= parseFloat(val)
                        ? 'reached'
                        : 'bg-slate-50 border-slate-100 text-slate-900';
                };

                const changeVal = parseFloat(item.change);
                let displayColorClass = "text-slate-900";
                let changeText = item.change || "--";

                if (!isNaN(changeVal)) {
                    if (changeVal > 0) {
                        displayColorClass = "text-red-600";
                    } else if (changeVal < 0) {
                        displayColorClass = "text-green-600";
                    }
                } else if (String(changeText).includes("+")) {
                    displayColorClass = "text-red-600";
                } else if (String(changeText).includes("-")) {
                    displayColorClass = "text-green-600";
                }

                const symbol = escapeHtml(item.symbol || "");
                const name = escapeHtml(item.name || "");
                const itemPrice = escapeHtml(item.price || "--");
                const itemChange = escapeHtml(changeText);

                const n1 = escapeHtml(item.number1 || "");
                const n2 = escapeHtml(item.number2 || "");
                const n3 = escapeHtml(item.number3 || "");
                const n4 = escapeHtml(item.number4 || "");
                const n5 = escapeHtml(item.number5 || "");

                listDiv.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-center gap-3 cursor-pointer hover:border-indigo-400 transition"
                         onclick="fillForm('${jsEscape(item.symbol)}','${jsEscape(item.number1)}','${jsEscape(item.number2)}','${jsEscape(item.number3)}','${jsEscape(item.number4)}','${jsEscape(item.number5)}')">

                        <div class="flex justify-between w-full md:w-80 items-center gap-2 flex-shrink-0 pr-2">
                            <div class="flex items-center gap-2 min-w-0 flex-1">
                                <div class="text-xl font-black text-slate-900 whitespace-nowrap">${symbol}</div>
                                <div class="text-xl font-black text-indigo-600 truncate" title="${name}">${name}</div>
                            </div>

                            <div class="flex justify-end items-center gap-2 flex-shrink-0 whitespace-nowrap">
                                <div class="text-xl font-black ${displayColorClass}">${itemPrice}</div>
                                <div class="text-base font-bold ${displayColorClass}">${itemChange}</div>
                            </div>
                        </div>

                        <div class="flex w-full md:flex-1 gap-2 mt-2 md:mt-0">
                            <div class="flex-1 py-2 rounded-xl border-2 text-center text-sm md:text-xl font-black ${checkColor(item.number1)}">${n1 || '--'}</div>
                            <div class="flex-1 py-2 rounded-xl border-2 text-center text-sm md:text-xl font-black ${checkColor(item.number2)}">${n2 || '--'}</div>
                            <div class="flex-1 py-2 rounded-xl border-2 text-center text-sm md:text-xl font-black ${checkColor(item.number3)}">${n3 || '--'}</div>
                            <div class="flex-1 py-2 rounded-xl border-2 text-center text-sm md:text-xl font-black ${checkColor(item.number4)}">${n4 || '--'}</div>
                            <div class="flex-1 py-2 rounded-xl border-2 text-center text-sm md:text-xl font-black ${checkColor(item.number5)}">${n5 || '--'}</div>

                            <button onclick="event.stopPropagation(); deleteData('${jsEscape(item.symbol)}')"
                                    class="px-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded font-bold transition">
                                ✕
                            </button>
                        </div>
                    </div>
                `;
            });
        }


        // =====================================================
        // 儲存資料
        // =====================================================
        function saveData() {
            const sym = document.getElementById('symbol').value.trim();

            if (!sym) {
                alert("請輸入股票代號");
                return;
            }

            if (!idToken) {
                alert("請先登入");
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.innerText = "處理中...";
            btn.disabled = true;

            const postData = {
                symbol: sym,
                number1: document.getElementById('n1').value,
                number2: document.getElementById('n2').value,
                number3: document.getElementById('n3').value,
                number4: document.getElementById('n4').value,
                number5: document.getElementById('n5').value
            };

            google.script.run
                .withSuccessHandler(function(res) {
                    fillForm('', '', '', '', '', '');
                    fetchAllData();
                })
                .withFailureHandler(function(err) {
                    const msg = err && err.message ? err.message : String(err);
                    alert("操作失敗：" + msg);
                })
                .apiSaveData(idToken, currentTab, postData);

            setTimeout(function() {
                btn.innerText = "儲存/更新";
                btn.disabled = false;
            }, 800);
        }


        // =====================================================
        // 刪除資料
        // =====================================================
        function deleteData(sym) {
            if (!idToken) {
                alert("請先登入");
                return;
            }

            if (!confirm(`確定要從「${currentTab}」刪除 ${sym} 嗎？`)) {
                return;
            }

            google.script.run
                .withSuccessHandler(function(res) {
                    fetchAllData();
                })
                .withFailureHandler(function(err) {
                    const msg = err && err.message ? err.message : String(err);
                    alert("刪除失敗：" + msg);
                })
                .apiDeleteData(idToken, currentTab, sym);
        }


        // =====================================================
        // 點擊清單自動填入表單
        // =====================================================
        function fillForm(s, n1, n2, n3, n4, n5) {
            document.getElementById('symbol').value = s || "";
            document.getElementById('n1').value = n1 || "";
            document.getElementById('n2').value = n2 || "";
            document.getElementById('n3').value = n3 || "";
            document.getElementById('n4').value = n4 || "";
            document.getElementById('n5').value = n5 || "";

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }


        // =====================================================
        // 防止 HTML 注入
        // =====================================================
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }


        // =====================================================
        // 防止 onclick 字串爆掉
        // =====================================================
        function jsEscape(value) {
            return String(value ?? "")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/"/g, "&quot;")
                .replace(/\n/g, "\\n")
                .replace(/\r/g, "");
        }


        // =====================================================
        // 自動更新，每 15 分鐘一次
        // =====================================================
        setInterval(function() {
            if (!idToken) {
                return;
            }

            console.log("背景自動更新...");
            fetchAllData();

        }, 15 * 60 * 1000);
    </script>

</body>
</html>
